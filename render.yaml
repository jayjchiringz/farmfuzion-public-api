# farmfuzion-public-api/render.yaml - Minimal version
services:
  - type: web
    name: farmfuzion-public-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9